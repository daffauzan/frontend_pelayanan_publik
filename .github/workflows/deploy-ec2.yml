name: Deploy Frontend to EC2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          ASSET_PREFIX: ${{ vars.ASSET_PREFIX }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_CLOUDFRONT_URL: ${{ vars.VITE_CLOUDFRONT_URL }}
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p '${{ secrets.EC2_DEPLOY_PATH }}'"

      - name: Sync build artifacts to EC2
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/ec2_key" dist/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/"

      - name: Optional post deploy command
        if: ${{ vars.EC2_POST_DEPLOY_CMD != '' }}
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "${{ vars.EC2_POST_DEPLOY_CMD }}"
