name: Deploy Frontend to EC2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EC2_HOST: ec2-3-27-124-5.ap-southeast-2.compute.amazonaws.com
  EC2_USER: ubuntu
  PUBLIC_API_URL: http://3.27.117.90:8080/api
  EC2_REPO_DIR: ~/frontend_pelayanan_publik
  EC2_DEPLOY_PATH: /var/www/pelayanan_publik

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          RAW_KEY='${{ secrets.EC2_SSH_PRIVATE_KEY }}'
          if printf '%s' "$RAW_KEY" | grep -q '\\n'; then
            # Support secrets pasted as one line containing literal \n.
            printf '%b' "$RAW_KEY" | tr -d '\r' > ~/.ssh/ec2_key
          else
            printf '%s\n' "$RAW_KEY" | tr -d '\r' > ~/.ssh/ec2_key
          fi
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ env.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull, build, and deploy on EC2
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/ec2_key "${{ env.EC2_USER }}@${{ env.EC2_HOST }}" \
            "set -e; \
            REPO_DIR='${{ env.EC2_REPO_DIR }}'; \
            DEPLOY_PATH='${{ env.EC2_DEPLOY_PATH }}'; \
            REPO_URL='https://github.com/${{ github.repository }}.git'; \
            BRANCH='${{ github.ref_name }}'; \
            mkdir -p \"\$REPO_DIR\"; \
            if [ -d \"\$REPO_DIR/.git\" ]; then \
              cd \"\$REPO_DIR\"; \
              git fetch origin; \
              git checkout \"\$BRANCH\"; \
              git pull --ff-only origin \"\$BRANCH\"; \
            else \
              rm -rf \"\$REPO_DIR\"; \
              git clone --branch \"\$BRANCH\" \"\$REPO_URL\" \"\$REPO_DIR\"; \
              cd \"\$REPO_DIR\"; \
            fi; \
            if ! command -v npm >/dev/null 2>&1; then \
              echo 'npm tidak ditemukan di EC2. Install Node.js terlebih dahulu.'; \
              exit 1; \
            fi; \
            export ASSET_PREFIX='${{ vars.ASSET_PREFIX }}'; \
            export PUBLIC_API_URL='${{ env.PUBLIC_API_URL }}'; \
            export VITE_API_URL='${{ env.PUBLIC_API_URL }}'; \
            export VITE_CLOUDFRONT_URL='${{ vars.VITE_CLOUDFRONT_URL }}'; \
            npm ci; \
            npm run build; \
            sudo mkdir -p \"\$DEPLOY_PATH\"; \
            sudo rsync -az --delete dist/ \"\$DEPLOY_PATH/\""

      - name: Optional post deploy command
        if: ${{ vars.EC2_POST_DEPLOY_CMD != '' }}
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/ec2_key "${{ env.EC2_USER }}@${{ env.EC2_HOST }}" \
            "${{ vars.EC2_POST_DEPLOY_CMD }}"
